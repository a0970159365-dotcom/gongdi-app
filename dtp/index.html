<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圖面進度管理系統</title>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
:root{--primary:#1a3a5c;--primary-l:#2563aa;--accent:#c2560a;--success:#16a34a;--danger:#dc2626;--warning:#ca8a04;--bg:#f1f5f9;--border:#cbd5e1;--text:#1e293b;--muted:#64748b}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft JhengHei','Noto Sans TC','PingFang TC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

nav{background:var(--primary);min-height:52px;display:flex;align-items:center;padding:0 16px;gap:4px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.25);flex-wrap:wrap}
.nav-logo{color:#fff;font-size:15px;font-weight:800;margin-right:8px;white-space:nowrap}
.nav-logo span{color:#93c5fd}
.nav-btn{background:transparent;border:none;color:rgba(255,255,255,.75);padding:6px 11px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s;white-space:nowrap}
.nav-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.nav-btn.active{background:rgba(255,255,255,.2);color:#fff;font-weight:700}
.nav-spacer{flex:1}
#sync-icon{font-size:13px;color:rgba(255,255,255,.6);padding:0 6px;cursor:default}
.nav-xbtn{background:#166534;color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:600}
.nav-xbtn:hover{filter:brightness(1.15)}

.container{max-width:1500px;margin:0 auto;padding:16px}
.page{display:none}.page.active{display:block}

.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px}
.card-header{padding:11px 16px;border-bottom:1px solid var(--bg);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.card-title{font-weight:700;font-size:14px;color:var(--primary);display:flex;align-items:center;gap:6px}
.card-title::before{content:'';display:block;width:3px;height:16px;background:var(--primary);border-radius:2px}
.card-body{padding:14px 16px}

.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.fi{border:1.5px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;font-family:inherit;color:var(--text);background:#fff;transition:border-color .15s;width:100%}
.fi:focus{outline:none;border-color:var(--primary-l);box-shadow:0 0 0 3px rgba(37,99,170,.1)}
textarea.fi{resize:vertical;min-height:60px}

.g{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}}

.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border:none;border-radius:6px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:var(--primary-l)}
.btn-s{background:var(--success);color:#fff}.btn-s:hover{filter:brightness(1.1)}
.btn-d{background:var(--danger);color:#fff}.btn-d:hover{filter:brightness(1.1)}
.btn-o{background:#fff;border:1.5px solid var(--border);color:var(--text)}.btn-o:hover{background:var(--bg)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-g:hover{background:var(--bg);color:var(--text)}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-icon{padding:5px 7px;min-width:28px;justify-content:center}
.btn-a{background:#e0f2fe;color:#0369a1;border:1px solid #bae6fd}.btn-a:hover{background:#bae6fd}
.d-none{display:none!important}

.filter-bar{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:10px 16px;margin-bottom:14px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}

/* STATUS BADGES */
.st-badge{display:inline-block;border-radius:4px;padding:3px 9px;font-size:12px;font-weight:700;white-space:nowrap;background:#e2e8f0;color:#475569}
.st-進行中{background:#dbeafe;color:#1d4ed8}
.st-送審中{background:#fef3c7;color:#b45309}
.st-已下單{background:#fed7aa;color:#c2410c}
.st-報價中{background:#cffafe;color:#0e7490}
.st-已完成{background:#dcfce7;color:#15803d}
.st-待確認{background:#f1f5f9;color:#475569;border:1px solid var(--border)}
.st-已定案{background:#166534;color:#fff}

.ex-tag{display:inline-block;background:#e0e7ff;color:#3730a3;border-radius:10px;padding:2px 8px;font-size:11px;margin:1px}
.wk-tag{display:inline-block;background:#f0fdf4;color:#166534;border-radius:4px;padding:2px 7px;font-size:12px;font-weight:700}
.loc-tag{display:inline-block;background:#fdf4ff;color:#7e22ce;border-radius:4px;padding:2px 7px;font-size:12px;font-weight:700;margin-bottom:3px}

.proj-section{margin-bottom:10px;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.proj-header{background:var(--primary);color:#fff;font-weight:700;font-size:13px;padding:9px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.proj-header:hover{background:#1e4a6e}
.proj-cnt{background:rgba(255,255,255,.18);border-radius:10px;padding:1px 8px;font-size:11px;margin-left:8px}
.chevron{transition:transform .2s}
.sec-collapsed .chevron{transform:rotate(-90deg)}

.ptbl{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
.ptbl th{background:#f8fafc;color:var(--primary);font-weight:700;padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;font-size:12px}
.ptbl td{border-bottom:1px solid #f1f5f9;padding:8px 10px;vertical-align:top}
.ptbl tbody tr:hover td{background:#f8fafc}

.log-ul{list-style:none;padding:0;margin:0}
.log-li{display:flex;gap:6px;padding:3px 0;border-bottom:1px dashed #e2e8f0;align-items:flex-start}
.log-li:last-child{border-bottom:none}
.log-dt{background:#e2e8f0;color:#475569;border-radius:3px;padding:1px 6px;font-size:11px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.log-tx{flex:1;line-height:1.5;color:var(--text)}
.log-plain{color:var(--muted);font-size:12px}

.hist-item{background:#fff;border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:14px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:4px solid var(--primary-l);transition:all .15s;cursor:pointer}
.hist-item:hover{transform:translateX(2px)}
.hist-proj{font-weight:800;color:var(--primary);font-size:13px}
.hist-time{font-size:11px;color:var(--muted);margin-top:2px}
.hist-wk{font-size:12px;color:var(--muted)}
.hist-last{font-size:13px;color:var(--text);margin-top:3px}

/* SETTINGS */
.set-grp-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--primary)}
.set-grp-title{font-size:13px;font-weight:700;color:var(--primary)}
.cfg-list-wrap{display:flex;flex-direction:column;gap:1px;margin-bottom:8px;max-height:200px;overflow-y:auto}
.cfg-row{display:flex;align-items:center;gap:6px;padding:5px 4px;border-bottom:1px dashed #e2e8f0;font-size:13px}
.cfg-row:last-child{border-bottom:none}
.cfg-row-lbl{flex:1;word-break:break-all;color:var(--text)}
.cfg-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 4px;line-height:1;flex-shrink:0}
.cfg-del:hover{color:var(--danger)}
.cfg-inp-row{display:flex;gap:6px;margin-top:6px}
.cfg-inp-row input{flex:1;min-width:0}
.log-edit-wrap{display:flex;flex-direction:column;gap:4px;border:1.5px solid var(--border);border-radius:6px;padding:8px;min-height:52px;max-height:300px;overflow-y:auto;background:#fafafa}
.log-edit-row{display:grid;grid-template-columns:148px 1fr 30px;gap:6px;align-items:center}
.log-edit-row .fi{padding:4px 8px;font-size:12px}
.cfg-empty-txt{font-size:12px;color:var(--muted);padding:6px 4px;text-align:center}
details.adv-details{margin-top:8px}
details.adv-details summary{font-size:12px;color:var(--muted);cursor:pointer;padding:6px 0;user-select:none}
details.adv-details summary:hover{color:var(--primary)}
details.adv-details>div{margin-top:12px;padding:14px;background:#f8fafc;border-radius:8px;border:1px solid var(--border)}

.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.overlay.show{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:680px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-title{font-size:16px;font-weight:800;color:var(--primary);margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:0 4px}
.modal-close:hover{color:var(--danger)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:14px;border-top:1px solid var(--bg)}

.toast-wrap{position:fixed;bottom:18px;right:18px;z-index:1000;display:flex;flex-direction:column;gap:5px}
.toast{background:#0f172a;color:#fff;padding:9px 15px;border-radius:7px;font-size:13px;display:flex;align-items:center;gap:7px;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:ti .25s ease}
.toast-s{background:var(--success)}.toast-e{background:var(--danger)}
@keyframes ti{from{transform:translateX(18px);opacity:0}to{transform:translateX(0);opacity:1}}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:10px}
@media(max-width:767px){nav{padding:6px 10px}.nav-logo{font-size:13px}.nav-btn{padding:5px 7px;font-size:11px}.nav-spacer{display:none}}
</style>
</head>
<body>

<nav>
  <span class="nav-logo">圖面 <span>進度表</span></span>
  <button class="nav-btn active" onclick="goPage('main')">📋 進度總表</button>
  <button class="nav-btn" onclick="goPage('history')">🗂️ 歷史</button>
  <button class="nav-btn" onclick="goPage('settings')">⚙️ 設定</button>
  <span class="nav-spacer"></span>
  <button class="nav-xbtn" onclick="exportExcel()">📊 匯出 Excel</button>
  <span id="sync-icon" title="雲端同步狀態">☁️</span>
</nav>

<div class="container">

<!-- ===== 進度總表 ===== -->
<div id="page-main" class="page active">
  <div class="filter-bar">
    <input type="text" id="q" class="fi" placeholder="搜尋案場、執行者、工作內容..." style="max-width:220px" oninput="renderMain()">
    <select id="f-proj" class="fi" style="max-width:170px" onchange="renderMain()"><option value="">全部案場</option></select>
    <select id="f-exec" class="fi" style="max-width:130px" onchange="renderMain()"><option value="">全部執行者</option></select>
    <select id="f-status" class="fi" style="max-width:120px" onchange="renderMain()"><option value="">全部狀態</option></select>
    <span id="result-count" style="font-size:12px;color:var(--muted)"></span>
    <button class="btn btn-p btn-sm" style="margin-left:auto" onclick="openEdit(null)">＋ 新增紀錄</button>
  </div>
  <div id="main-table"></div>
</div>

<!-- ===== 歷史 ===== -->
<div id="page-history" class="page">
  <div class="card">
    <div class="card-header">
      <span class="card-title">異動歷史（依更新時間排序）</span>
      <input type="text" id="hist-q" class="fi" placeholder="搜尋..." style="max-width:200px" oninput="renderHistory()">
    </div>
    <div class="card-body" id="hist-list"></div>
  </div>
</div>

<!-- ===== 設定 ===== -->
<div id="page-settings" class="page">
  <div class="card">
    <div class="card-header">
      <span class="card-title">⚙️ 清單設定</span>
      <span style="font-size:12px;color:var(--muted)">管理各欄位的下拉選項，新增後可在編輯紀錄時選擇</span>
    </div>
    <div class="card-body">

      <!-- 案場 -->
      <div class="set-grp-hdr">
        <span class="set-grp-title">📁 案場</span>
        <button class="btn btn-a btn-sm" onclick="cfgAddFromBtn('案場')">＋ 新增</button>
      </div>
      <div class="cfg-list-wrap" style="max-height:160px" id="lw-案場"></div>
      <div class="cfg-inp-row" id="ir-案場" style="display:none">
        <input type="text" id="cfg-inp-案場" class="fi" placeholder="輸入案場名稱後按 Enter"
          onkeydown="if(event.key==='Enter')cfgAdd('案場');if(event.key==='Escape')cfgHideInp('案場')">
        <button class="btn btn-p btn-sm" onclick="cfgAdd('案場')">新增</button>
        <button class="btn btn-g btn-sm" onclick="cfgHideInp('案場')">取消</button>
      </div>

      <div style="height:1px;background:var(--bg);margin:16px 0"></div>

      <!-- 部門 + 執行者 -->
      <div class="g g2" style="gap:20px;align-items:start">
        <div>
          <div class="set-grp-hdr">
            <span class="set-grp-title">🏢 部門</span>
            <button class="btn btn-a btn-sm" onclick="cfgAddFromBtn('部門')">＋ 新增</button>
          </div>
          <div class="cfg-list-wrap" id="lw-部門"></div>
          <div class="cfg-inp-row" id="ir-部門" style="display:none">
            <input type="text" id="cfg-inp-部門" class="fi" placeholder="部門名稱"
              onkeydown="if(event.key==='Enter')cfgAdd('部門');if(event.key==='Escape')cfgHideInp('部門')">
            <button class="btn btn-p btn-sm" onclick="cfgAdd('部門')">新增</button>
            <button class="btn btn-g btn-sm" onclick="cfgHideInp('部門')">取消</button>
          </div>
        </div>
        <div>
          <div class="set-grp-hdr">
            <span class="set-grp-title">👤 執行者</span>
            <button class="btn btn-a btn-sm" onclick="cfgAddFromBtn('執行者')">＋ 新增</button>
          </div>
          <div class="cfg-list-wrap" id="lw-執行者"></div>
          <div class="cfg-inp-row" id="ir-執行者" style="display:none">
            <input type="text" id="cfg-inp-執行者" class="fi" placeholder="人員姓名"
              onkeydown="if(event.key==='Enter')cfgAdd('執行者');if(event.key==='Escape')cfgHideInp('執行者')">
            <button class="btn btn-p btn-sm" onclick="cfgAdd('執行者')">新增</button>
            <button class="btn btn-g btn-sm" onclick="cfgHideInp('執行者')">取消</button>
          </div>
        </div>
      </div>

      <div style="height:1px;background:var(--bg);margin:16px 0"></div>

      <!-- 施作位置／工作項目 + 狀態 -->
      <div class="g g2" style="gap:16px;align-items:start">
        <div>
          <div class="set-grp-hdr">
            <span class="set-grp-title">📍 施作位置／工作項目</span>
            <button class="btn btn-a btn-sm" onclick="cfgAddFromBtn('施作位置')">＋ 新增</button>
          </div>
          <div class="cfg-list-wrap" id="lw-施作位置"></div>
          <div class="cfg-inp-row" id="ir-施作位置" style="display:none">
            <input type="text" id="cfg-inp-施作位置" class="fi" placeholder="施作位置或工作項目"
              onkeydown="if(event.key==='Enter')cfgAdd('施作位置');if(event.key==='Escape')cfgHideInp('施作位置')">
            <button class="btn btn-p btn-sm" onclick="cfgAdd('施作位置')">新增</button>
            <button class="btn btn-g btn-sm" onclick="cfgHideInp('施作位置')">取消</button>
          </div>
        </div>
        <div>
          <div class="set-grp-hdr">
            <span class="set-grp-title">🏷️ 狀態</span>
            <button class="btn btn-a btn-sm" onclick="cfgAddFromBtn('狀態')">＋ 新增</button>
          </div>
          <div class="cfg-list-wrap" id="lw-狀態"></div>
          <div class="cfg-inp-row" id="ir-狀態" style="display:none">
            <input type="text" id="cfg-inp-狀態" class="fi" placeholder="狀態名稱"
              onkeydown="if(event.key==='Enter')cfgAdd('狀態');if(event.key==='Escape')cfgHideInp('狀態')">
            <button class="btn btn-p btn-sm" onclick="cfgAdd('狀態')">新增</button>
            <button class="btn btn-g btn-sm" onclick="cfgHideInp('狀態')">取消</button>
          </div>
        </div>
      </div>

      <!-- 資料備份 -->
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--bg);display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--muted)">資料備份：</span>
        <button class="btn btn-o btn-sm" onclick="exportJson()">⬇️ 匯出 JSON</button>
        <label class="btn btn-o btn-sm" style="cursor:pointer">⬆️ 匯入 JSON <input type="file" accept=".json" onchange="importJson(event)" style="display:none"></label>
        <span id="api-status-txt" style="font-size:12px;color:var(--muted);margin-left:auto"></span>
      </div>

    </div>
  </div>
</div>

</div>

<!-- ===== EDIT MODAL ===== -->
<div id="edit-overlay" class="overlay" onclick="overlayClick(event)">
  <div class="modal-box">
    <div class="modal-title">
      <span id="modal-title-text">新增紀錄</span>
      <button class="modal-close" onclick="closeEdit()">✕</button>
    </div>
    <input type="hidden" id="edit-id">

    <!-- datalists -->
    <datalist id="dl-案場"></datalist>
    <datalist id="dl-部門"></datalist>
    <datalist id="dl-執行者"></datalist>
    <datalist id="dl-施作位置"></datalist>

    <div class="g g2" style="gap:12px;margin-bottom:12px">
      <div class="fg" style="grid-column:span 2">
        <label class="fl">案場 *</label>
        <input type="text" id="e-proj" class="fi" list="dl-案場" placeholder="選擇或輸入案場名稱">
      </div>
      <div class="fg">
        <label class="fl">部門</label>
        <input type="text" id="e-dept" class="fi" list="dl-部門" placeholder="選擇或輸入部門">
      </div>
      <div class="fg">
        <label class="fl">執行者</label>
        <input type="text" id="e-exec" class="fi" list="dl-執行者" placeholder="多人可用、分隔">
      </div>
      <div class="fg" style="grid-column:span 2">
        <label class="fl">施作位置／工作項目</label>
        <input type="text" id="e-loc" class="fi" list="dl-施作位置" placeholder="選擇或輸入施作位置／工作項目">
      </div>
      <div class="fg" style="grid-column:span 2">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <label class="fl" style="margin-bottom:0">進度記錄</label>
          <button type="button" class="btn btn-a btn-sm" onclick="addLogRow()">＋ 新增一筆</button>
        </div>
        <div id="log-editor" class="log-edit-wrap"></div>
      </div>
      <div class="fg">
        <label class="fl">備註</label>
        <textarea id="e-note" class="fi" rows="3" placeholder="材質、注意事項..."></textarea>
      </div>
      <div class="fg">
        <label class="fl">狀態</label>
        <select id="e-status" class="fi"></select>
      </div>
    </div>

    <div class="modal-footer">
      <button id="del-btn" class="btn btn-d btn-sm" onclick="delRecord()" style="margin-right:auto;display:none">🗑️ 刪除</button>
      <button class="btn btn-o btn-sm" onclick="closeEdit()">取消</button>
      <button class="btn btn-p btn-sm" onclick="saveRecord()">💾 儲存</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ============================================================
// 初始資料

function buildDefaultCfg(){
  const projSet=new Set(), execSet=new Set(), locSet=new Set();
  INIT.forEach(r=>{
    projSet.add(r.案場);
    (r.執行者||'').split(/[、,，\n]/).forEach(e=>{const t=e.trim();if(t)execSet.add(t)});
    if(r.施作位置)locSet.add(r.施作位置);
    if(r.工作項目)locSet.add(r.工作項目);
  });
  return {
    案場:[...projSet].sort(),
    部門:[],
    執行者:[...execSet].sort(),
    施作位置:[...locSet].filter(Boolean).sort(),
    狀態:['進行中','送審中','已下單','報價中','已完成','待確認','已定案']
  };
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function uid(){return 'r_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)}
function toast(msg,type=''){
  const w=document.getElementById('toast-wrap');

  el.className='toast'+(type?' toast-'+type:'');

function cfgAdd(key){
  const inp=document.getElementById('cfg-inp-'+key);

  if(!val)return;
  if(!cfg[key])cfg[key]=[];
  if(cfg[key].includes(val)){toast('已存在','');return}
  cfg[key].push(val);

}
function cfgDel(key,idx){

}

function parseLogToRows(text){
  if(!text)return[];
  return text.split('\n').filter(l=>l.trim()).map(line=>{
    const m=line.match(/^(\d{1,4}\/\d{1,2}(?:\/\d{1,2})?)\s+([\s\S]*)/);
    if(m){
      const parts=m[1].split('/');
      let dateStr='';
      try{
        if(parts.length===2){const y=new Date().getFullYear();dateStr=`${y}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`}
        else if(parts.length===3){dateStr=`${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`}
      }catch{}
      return{date:dateStr,text:m[2]};
    }
    return{date:'',text:line};
  });
}
function logRowsToString(){
  return[...document.querySelectorAll('.log-edit-row')].map(row=>{
    const d=row.querySelector('.log-date').value;
    const t=row.querySelector('.log-text').value.trim();
    if(!d&&!t)return'';
    if(d){const dt=new Date(d+'T12:00:00');const mm=String(dt.getMonth()+1).padStart(2,'0');const dd=String(dt.getDate()).padStart(2,'0');return`${mm}/${dd} ${t}`}
    return t;
  }).filter(Boolean).join('\n');
}
function addLogRow(date='',text=''){
  const editor=document.getElementById('log-editor');
  if(!editor)return;
  const row=document.createElement('div');
  row.className='log-edit-row';
  row.innerHTML=`<input type="date" class="fi log-date" value="${esc(date)}"><input type="text" class="fi log-text" placeholder="工作進度說明..." value="${esc(text)}"><button class="btn btn-g btn-icon btn-sm" onclick="this.closest('.log-edit-row').remove()" title="刪除">✕</button>`;
  editor.appendChild(row);
}

function updateDataLists(){
  // datalists for text inputs
  ['案場','部門','執行者','施作位置'].forEach(k=>{
    const el=document.getElementById('dl-'+k);
    if(el)el.innerHTML=(cfg[k]||[]).map(v=>`<option value="${esc(v)}">`).join('');
  });
  // 狀態 select options
  const stSel=document.getElementById('e-status');
  if(stSel){
    const cur=stSel.value;
    stSel.innerHTML=(cfg['狀態']||[]).map(v=>`<option${v===cur?' selected':''}>${esc(v)}</option>`).join('');
  }
  // filter dropdowns
  updateFilters();
}

// ============================================================
// Firebase 同步
// ============================================================
async function fbSave(){
  saveLocal();saveCfgLocal();
  if(!window._fbSet){setSyncIcon('err');return}
  try{
    const recObj={};records.forEach(r=>{recObj[r.id]=r});
    await window._fbSet({records:recObj,cfg});
    setSyncIcon('ok');
  }catch(e){console.warn('fbSave failed:',e);setSyncIcon('err')}
}
async function initFb(){
  let t=0;
  while(!window._fbGet&&t<5000){await new Promise(r=>setTimeout(r,200));t+=200}
  if(!window._fbGet){setSyncIcon('err');loadLocal();return}
  try{
    const data=await window._fbGet();
    if(data&&data.records){
      records=Object.values(data.records);
      if(data.cfg&&Object.keys(data.cfg).length){cfg={...buildDefaultCfg(),...data.cfg};saveCfgLocal()}
      saveLocal();setSyncIcon('ok');
    }else{
      loadLocal();
      if(records.length)fbSave();
    }
  }catch(e){console.warn('Firebase 連線失敗，使用本機資料:',e);setSyncIcon('err');loadLocal()}
  renderMain();renderHistory();updateFilters();
}
function saveLocal(){localStorage.setItem('dtp_rec',JSON.stringify(records))}
function saveCfgLocal(){localStorage.setItem('dtp_cfg',JSON.stringify(cfg))}
function loadLocal(){
  const s=localStorage.getItem('dtp_rec');
  records=s?JSON.parse(s):INIT.map(r=>({...r}));
  if(!s)saveLocal();
}

function getFiltered(){
  const q=(document.getElementById('q')||{value:''}).value.toLowerCase();
  const fp=(document.getElementById('f-proj')||{value:''}).value;
  const fe=(document.getElementById('f-exec')||{value:''}).value;
  const fs=(document.getElementById('f-status')||{value:''}).value;
  return records.filter(r=>{
    if(fp&&r.案場!==fp)return false;
    if(fe&&!(r.執行者||'').includes(fe))return false;
    if(fs&&r.狀態!==fs)return false;
    if(q&&![r.案場,r.部門,r.執行者,r.施作位置,r.進度記錄,r.備註].join(' ').toLowerCase().includes(q))return false;
    return true;
  });
}

function updateFilters(){
  const ps=[...new Set(records.map(r=>r.案場))].sort();
  const es=[...new Set(records.flatMap(r=>(r.執行者||'').split(/[、,，\n]/).map(e=>e.trim()).filter(Boolean)))].sort();
  const pSel=document.getElementById('f-proj'),eSel=document.getElementById('f-exec'),stSel=document.getElementById('f-status');
  if(!pSel)return;
  const pv=pSel.value,ev=eSel.value,sv=stSel.value;
  pSel.innerHTML='<option value="">全部案場</option>'+ps.map(p=>`<option${p===pv?' selected':''}>${esc(p)}</option>`).join('');
  eSel.innerHTML='<option value="">全部執行者</option>'+es.map(e=>`<option${e===ev?' selected':''}>${esc(e)}</option>`).join('');
  stSel.innerHTML='<option value="">全部狀態</option>'+(cfg['狀態']||[]).map(s=>`<option${s===sv?' selected':''}>${esc(s)}</option>`).join('');
}

function renderMain(){
  const filtered=getFiltered();
  document.getElementById('result-count').textContent='共 '+filtered.length+' 筆';
  const groups={};
  filtered.forEach(r=>{if(!groups[r.案場])groups[r.案場]=[];groups[r.案場].push(r)});
  const el=document.getElementById('main-table');
  if(!filtered.length){el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>沒有符合的資料</div>';return}
  el.innerHTML=Object.entries(groups).map(([proj,rows])=>{
    const sid='s_'+proj.replace(/\W/g,'_');
    return`<div class="proj-section">
      <div class="proj-header" onclick="toggleSec('${sid}',this)">
        <span><span class="chevron" style="margin-right:6px">▼</span>📁 ${esc(proj)}<span class="proj-cnt">${rows.length} 筆</span></span>
      </div>
      <div id="${sid}">
        <table class="ptbl">
          <thead><tr>
            <th style="width:10%">執行者</th>
            <th style="width:14%">施作位置／工作項目</th>
            <th style="width:57%">進度記錄</th>
            <th style="width:8%">狀態</th>
            <th style="width:8%">備註</th>
            <th style="width:3%"></th>
          </tr></thead>
          <tbody>${rows.map(renderRow).join('')}</tbody>
        </table>
      </div>
    </div><div style="height:2px"></div>`;
  }).join('');
}

function renderRow(r){
  const exs=(r.執行者||'').split(/[、,，\n]/).map(e=>e.trim()).filter(Boolean).map(e=>`<span class="ex-tag">${esc(e)}</span>`).join('');
  const loc=r.施作位置?`<span class="loc-tag">${esc(r.施作位置)}</span>`:'';
  const log=renderLog(r.進度記錄);
  const note=r.備註?`<div style="font-size:12px;color:var(--muted);line-height:1.5">${esc(r.備註).replace(/\n/g,'<br>')}</div>`:'';
  const st=r.狀態||'進行中';
  const stClass='st-badge st-'+esc(st.replace(/\s/g,''));
  return`<tr>
    <td>${exs}${r.部門?`<div style="font-size:11px;color:var(--muted);margin-top:3px">${esc(r.部門)}</div>`:''}</td>
    <td>${loc}</td>
    <td>${log}</td>
    <td><span class="${stClass}">${esc(st)}</span></td>
    <td>${note}</td>
    <td><button class="btn btn-g btn-icon btn-sm" onclick="openEdit('${esc(r.id)}')" title="編輯">✏️</button></td>
  </tr>`;
}

function renderLog(text){
  if(!text)return'';
  return'<ul class="log-ul">'+text.split('\n').filter(l=>l.trim()).map(line=>{
    const m=line.match(/^(\d{1,4}\/\d{1,2}(?:\/\d{1,2})?)\s+([\s\S]*)/);
    if(m)return`<li class="log-li"><span class="log-dt">${esc(m[1])}</span><span class="log-tx">${esc(m[2])}</span></li>`;
    return`<li class="log-li"><span class="log-tx log-plain">${esc(line)}</span></li>`;
  }).join('')+'</ul>';
}

function toggleSec(id,hdr){
  document.getElementById(id).classList.toggle('d-none');
  hdr.classList.toggle('sec-collapsed');
}

function renderHistory(){
  const q=(document.getElementById('hist-q')||{value:''}).value.toLowerCase();
  const sorted=[...records].sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||''));
  const filtered=q?sorted.filter(r=>[r.案場,r.執行者,r.施作位置,r.工作項目,r.進度記錄].join(' ').toLowerCase().includes(q)):sorted;
  const el=document.getElementById('hist-list');
  if(!filtered.length){el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>沒有資料</div>';return}
  el.innerHTML=filtered.map(r=>{
    const lastLine=(r.進度記錄||'').trim().split('\n').filter(l=>l.trim()).slice(-1)[0]||'—';
    const dt=r.updatedAt?new Date(r.updatedAt).toLocaleDateString('zh-TW'):'—';
    const st=r.狀態||'進行中';
    const sub=[r.執行者,r.施作位置].filter(Boolean).join(' · ');
    return`<div class="hist-item" onclick="openEdit('${esc(r.id)}')">
      <div style="min-width:110px">
        <div class="hist-proj">${esc(r.案場)}</div>
        <div class="hist-time">更新：${esc(dt)}</div>
        <div style="margin-top:5px"><span class="st-badge st-${esc(st.replace(/\s/g,''))}">${esc(st)}</span></div>
      </div>
      <div style="flex:1">
        <div class="hist-wk">${esc(sub)}</div>
        <div class="hist-last">${esc(lastLine)}</div>
        ${r.備註?`<div style="font-size:11px;color:var(--muted);margin-top:3px">${esc(r.備註.split('\n')[0])}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function openEdit(id){
  document.getElementById('edit-id').value=id||'';
  document.getElementById('modal-title-text').textContent=id?'編輯紀錄':'新增紀錄';
  document.getElementById('del-btn').style.display=id?'':'none';
  // 更新狀態下拉
  const stSel=document.getElementById('e-status');
  stSel.innerHTML=(cfg['狀態']||[]).map(v=>`<option>${esc(v)}</option>`).join('');
  const editor=document.getElementById('log-editor');
  editor.innerHTML='';
  if(id){
    const r=records.find(x=>x.id===id);
    if(!r)return;
    document.getElementById('e-proj').value=r.案場||'';
    document.getElementById('e-dept').value=r.部門||'';
    document.getElementById('e-exec').value=r.執行者||'';
    document.getElementById('e-loc').value=r.施作位置||'';
    document.getElementById('e-note').value=r.備註||'';
    stSel.value=r.狀態||'進行中';
    const rows=parseLogToRows(r.進度記錄||'');
    if(rows.length)rows.forEach(row=>addLogRow(row.date,row.text));else addLogRow();
  }else{
    ['e-proj','e-dept','e-exec','e-loc','e-note'].forEach(fid=>document.getElementById(fid).value='');
    stSel.value=cfg['狀態']?.[0]||'進行中';
    addLogRow();
  }
  document.getElementById('edit-overlay').classList.add('show');
}

    部門:document.getElementById('e-dept').value.trim(),
    執行者:document.getElementById('e-exec').value.trim(),
    施作位置:document.getElementById('e-loc').value.trim(),
    工作項目:'',
    進度記錄:logRowsToString(),
    備註:document.getElementById('e-note').value.trim(),
    狀態:document.getElementById('e-status').value,
    updatedAt:new Date().toISOString()
  };
  if(id){const i=records.findIndex(x=>x.id===id);if(i>=0)records[i]=r;else records.push(r)}
  else records.push(r);
  fbSave();renderMain();renderHistory();updateFilters();closeEdit();
  toast('已儲存 ✓','s');
}
function delRecord(){
  const id=document.getElementById('edit-id').value;
  if(!id||!confirm('確定刪除這筆紀錄？'))return;
  records=records.filter(r=>r.id!==id);
  fbSave();renderMain();renderHistory();updateFilters();closeEdit();
  toast('已刪除','s');
}


// ============================================================
// 匯出 Excel
// ============================================================
async function exportExcel(){
  const data=getFiltered();
  const wb=new ExcelJS.Workbook();
  const ws=wb.addWorksheet('圖面進度表');
  ws.columns=[
    {header:'案場',width:22},{header:'部門',width:14},{header:'執行者',width:18},
    {header:'施作位置／工作項目',width:20},
    {header:'進度記錄',width:55},{header:'狀態',width:12},{header:'備註',width:26}
  ];
  const hr=ws.getRow(1);hr.height=26;
  hr.eachCell(c=>{
    c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1A3A5C'}};
    c.font={bold:true,color:{argb:'FFFFFFFF'},size:11};
    c.alignment={vertical:'middle',horizontal:'center'};
  });
  const SBG={'進行中':'FFDBEAFE','送審中':'FFFEF3C7','已下單':'FFFED7AA','報價中':'FFCFFAFE','已完成':'FFDCFCE7','待確認':'FFF1F5F9','已定案':'FF166534'};
  const SFG={'已定案':'FFFFFFFF'};
  data.forEach((r,i)=>{
    const row=ws.addRow([r.案場,r.部門,r.執行者,r.施作位置,r.進度記錄,r.狀態,r.備註]);
    row.height=Math.max(40,(r.進度記錄||'').split('\n').length*16);
    row.eachCell(c=>{c.alignment={vertical:'top',wrapText:true};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:i%2===0?'FFF8FAFC':'FFFFFFFF'}}});
    const sc=row.getCell(6);
    if(SBG[r.狀態])sc.fill={type:'pattern',pattern:'solid',fgColor:{argb:SBG[r.狀態]}};
    if(SFG[r.狀態])sc.font={bold:true,color:{argb:SFG[r.狀態]}};
    sc.alignment={vertical:'middle',horizontal:'center',wrapText:false};
  });
  const buf=await wb.xlsx.writeBuffer();
  const url=URL.createObjectURL(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}));
  const a=document.createElement('a');a.href=url;a.download='圖面進度表_'+new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')+'.xlsx';a.click();
  URL.revokeObjectURL(url);toast('Excel 已匯出 ✓','s');
}

// JSON 備份
function exportJson(){
  const b=new Blob([JSON.stringify({records,cfg},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='圖面進度表備份_'+new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')+'.json';a.click();
}
function importJson(e){
  const f=e.target.files[0];if(!f)return;
  const rdr=new FileReader();rdr.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.records&&data.cfg){
        if(!confirm(`確定匯入 ${data.records.length} 筆資料＋設定？這會覆蓋現有資料。`))return;
        records=data.records;cfg=data.cfg;
      }else if(Array.isArray(data)&&data[0]?.id){
        if(!confirm(`確定匯入 ${data.length} 筆資料？`))return;
        records=data;
      }else throw new Error();
      fbSave();saveCfg();renderMain();renderHistory();renderCfgCards();updateDataLists();
      toast('匯入成功 ✓','s');
    }catch{alert('JSON 格式錯誤')}
  };rdr.readAsText(f);e.target.value='';
}
